<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password</title>

    <link rel="stylesheet" href="updatePassword.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="login-card">

        <h2>Update Password</h2>
        <p>Enter your registered email and choose a secure password.</p>

        <form id="updatePasswordForm">

            <!-- Email -->

            <div class="form-group">
                <label for="email">Email Address</label>

                <input type="email" id="email" name="email" placeholder="Enter your registered email"
                    autocomplete="email" required>
            </div>

            <!-- New Password -->

            <div class="form-group">
                <label for="password">New Password</label>

                <input type="password" id="password" name="password" placeholder="Enter your new password" minlength="8"
                    autocomplete="new-password" required>
            </div>

            <!-- Confirm Password -->

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>

                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password"
                    minlength="8" autocomplete="new-password" required>
            </div>

            <!-- Show Password -->

            <div class="extra-options">

                <label class="show-password">

                    <input type="checkbox" id="showPassword">

                    Show Password

                </label>

            </div>

            <p class="password-info">
                Password must contain at least <strong>8 characters</strong>.
            </p>

            <button type="submit" class="login-btn">

                Update Password

            </button>

        </form>

        <p id="successMessage"></p>

        <div class="register-link">

            Remember your password?

            <a href="login.html">

                Login

            </a>

        </div>

    </div>
    <script src="updatePassword.js"></script>

</body>

</html>
