<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggestions - Kamran</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="suggestion.css">
</head>

<body>

  <div class="container" id="container">
    <h1>Give Your Suggestion</h1>

    <form id="suggestion-form">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label for="email">Username</label>
      <input type="email" id="email" placeholder="Enter your username" required>

      <label for="message">Suggestion</label>
      <textarea id="suggestion" placeholder="Write your suggestion..."></textarea>

      <button type="submit">Submit</button>
    </form>
    <a href="index.html" class="back">← Back to Home</a>
  </div>

  <div id="loginMessage">
    <h3 id="successMessage"></h3>
  </div>
  <script src="suggestion.js"></script>
</body>

</html>
